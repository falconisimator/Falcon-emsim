<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>emsim — Busbar EM Simulator (web)</title>
  <style>
    :root { color-scheme: light dark; --bd: #8884; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
    #toolbar { display: flex; gap: 6px; align-items: center; padding: 6px 10px; border-bottom: 1px solid var(--bd); flex-wrap: wrap; }
    #toolbar button { padding: 5px 9px; cursor: pointer; }
    #toolbar .sep { width: 1px; height: 22px; background: var(--bd); margin: 0 4px; }
    #main { flex: 1; display: flex; min-height: 0; }
    #stage { flex: 1; position: relative; background: #fbfcfd; min-width: 0; }
    #editor { position: absolute; inset: 0; }
    #fieldOverlay { position: absolute; inset: 0; background: #fff; display: none; flex-direction: column; }
    #fieldBar { display: flex; gap: 8px; align-items: center; padding: 6px 10px; border-bottom: 1px solid var(--bd); }
    #fieldBar select { width: auto; }
    #fieldCanvas { flex: 1; width: 100%; min-height: 0; }
    #sidebar { width: 330px; border-left: 1px solid var(--bd); overflow-y: auto; padding: 10px; }
    h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: #888; margin: 14px 0 6px; }
    label { display: block; font-size: 12px; margin: 8px 0 2px; }
    input, select { width: 100%; padding: 5px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    button { cursor: pointer; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
    th, td { border: 1px solid var(--bd); padding: 3px 5px; text-align: right; }
    th:first-child, td:first-child { text-align: left; }
    #status { padding: 5px 10px; border-top: 1px solid var(--bd); font-size: 12px; color: #888; }
    #propPanel[hidden], #resultsBox[hidden] { display: none; }
    .muted { font-size: 11px; color: #999; }
    #isoBadge { font-size: 12px; color: #1f6feb; font-weight: 600; }
  </style>
</head>
<body>
  <div id="toolbar">
    <strong>emsim</strong>
    <span class="sep"></span>
    <button id="addBar">+ Bar</button>
    <button id="addRound">+ Round</button>
    <button id="copy">Copy</button>
    <button id="paste">Paste</button>
    <button id="del">Delete</button>
    <span class="sep"></span>
    <button id="save">Save</button>
    <button id="load">Load</button>
    <input id="loadFile" type="file" accept=".json" hidden />
    <span class="sep"></span>
    <button id="solve" disabled style="font-weight:600">Solve</button>
    <span id="isoBadge"></span>
    <span id="boot" class="muted">loading runtime…</span>
  </div>

  <div id="main">
    <div id="stage">
      <div id="editor"></div>
      <div id="fieldOverlay">
        <div id="fieldBar">
          <button id="editBtn">← Edit geometry</button>
          <label style="margin:0">Field</label>
          <select id="field">
            <option value="J">Current density J_z(t)</option>
            <option value="Jn">J / avg (instantaneous)</option>
            <option value="B">Flux density |B(t)|</option>
            <option value="A">Vector potential A_z(t)</option>
          </select>
          <button id="info" title="What is this view?">ⓘ Info</button>
          <button id="play">▶ Animate</button>
          <button id="staticBtn">Static</button>
          <button id="sumPeriod" title="Sum the instantaneous current over one period">Σ over period</button>
          <label style="margin:0 0 0 8px">Speed</label>
          <input id="speed" type="range" min="1500" max="10000" value="5000" step="500" style="width:120px" />
        </div>
        <canvas id="fieldCanvas"></canvas>
        <div id="fieldInfo" hidden style="position:absolute;left:14px;bottom:14px;max-width:520px;
             background:rgba(20,22,26,.92);color:#eee;padding:10px 12px;border-radius:6px;
             font-size:12px;line-height:1.45;box-shadow:0 2px 10px #0006"></div>
      </div>
    </div>

    <div id="sidebar">
      <h2>Simulation</h2>
      <label>Frequency (Hz)</label>
      <input id="freq" type="number" value="60" step="10" />
      <label><input id="threephase" type="checkbox" checked style="width:auto"> Balanced 3-phase (A/B/C)</label>
      <label>Terminal current |I| (A)</label>
      <input id="current" type="number" value="1000" step="100" />
      <div class="muted" style="margin-top:6px">Phase:
        <span style="color:#d65f5f;font-weight:700">■ A</span>
        <span style="color:#5f9ed6;font-weight:700">■ B</span>
        <span style="color:#5fd68a;font-weight:700">■ C</span></div>
      <div class="muted" style="margin-top:6px">Double-click a bar to edit its busbar (add shapes into it).
        Ctrl+C / Ctrl+V to copy-paste. Esc exits.</div>

      <div id="propPanel" hidden>
        <h2>Selected shape</h2>
        <div class="grid2">
          <div><label>Width / R (mm)</label><input id="pW" type="number" step="1"></div>
          <div><label id="pHlabel">Height (mm)</label><input id="pH" type="number" step="1"></div>
          <div><label>x (mm)</label><input id="pX" type="number" step="1"></div>
          <div><label>y (mm)</label><input id="pY" type="number" step="1"></div>
          <div><label>Rotation (°)</label><input id="pRot" type="number" step="5"></div>
          <div><label>Phase</label>
            <select id="pPhase"><option>A</option><option>B</option><option>C</option></select></div>
        </div>
        <label>Material</label>
        <select id="pMat"><option>Copper</option><option>Aluminium</option><option>Steel</option></select>
      </div>

      <div id="resultsBox" hidden>
        <h2>Results <button id="showField" style="float:right;font-size:11px">show field ▸</button></h2>
        <table id="results"><thead><tr><th>Phase</th><th>|I| A</th><th>Share</th><th>Loss W/m</th></tr></thead><tbody></tbody></table>
        <div id="summary" class="muted" style="margin-top:6px"></div>
      </div>
    </div>
  </div>
  <div id="status">Booting Python (Pyodide + WebAssembly)…</div>

  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
  <script src="engine.js?v=12"></script>
  <script src="editor.js?v=12"></script>
</body>
</html>
